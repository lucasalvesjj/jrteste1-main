# ─────────────────────────────────────────────────────────────────────────────
# sync-blog.yml — DESATIVADO neste repositório (jrteste1-main)
#
# Este workflow foi movido para comercial-jr-2 e não deve rodar aqui.
# Manter o arquivo apenas para referência histórica.
# ─────────────────────────────────────────────────────────────────────────────

name: Sync blog-posts.json para produção (DESATIVADO)

on:
  workflow_dispatch: # só roda se disparado manualmente — nunca automático

jobs:
  sync:
    name: Publica blog-posts.json → comercial-jr-2
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repositório de trabalho
        uses: actions/checkout@v4

      - name: Publica blog-posts.json no repo de produção
        env:
          GH_TOKEN: ${{ secrets.BLOG_PUBLISH_TOKEN }}
          PROD_REPO: lucasalvesjj/comercial-jr-2
          PROD_BRANCH: main
          FILE_PATH: public/data/blog-posts.json
        run: |
          set -e

          echo "📄 Lendo arquivo..."
          CONTENT=$(base64 -w 0 "$FILE_PATH")

          echo "🔍 Buscando SHA atual no repo de produção..."
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/$PROD_REPO/contents/$FILE_PATH?ref=$PROD_BRANCH")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -1)

          if [ "$HTTP_CODE" = "200" ]; then
            SHA=$(echo "$BODY" | python3 -c "import sys,json; print(json.load(sys.stdin)['sha'])")
            echo "SHA encontrado: $SHA"
            PAYLOAD=$(python3 -c "import json; print(json.dumps({'message': 'blog: sync via GitHub Actions', 'content': '$CONTENT', 'branch': '$PROD_BRANCH', 'sha': '$SHA'}))")
          elif [ "$HTTP_CODE" = "404" ]; then
            echo "Arquivo não existe ainda, será criado."
            PAYLOAD=$(python3 -c "import json; print(json.dumps({'message': 'blog: cria blog-posts.json via GitHub Actions', 'content': '$CONTENT', 'branch': '$PROD_BRANCH'}))")
          else
            echo "❌ Erro ao buscar arquivo: HTTP $HTTP_CODE"
            echo "$BODY"
            exit 1
          fi

          echo "🚀 Enviando para produção..."
          RESULT=$(curl -s -o /dev/null -w "%{http_code}" \
            -X PUT \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "Content-Type: application/json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/$PROD_REPO/contents/$FILE_PATH" \
            -d "$PAYLOAD")

          if [ "$RESULT" = "200" ] || [ "$RESULT" = "201" ]; then
            echo "✅ blog-posts.json publicado com sucesso no $PROD_REPO!"
          else
            echo "❌ Falha ao publicar: HTTP $RESULT"
            exit 1
          fi
